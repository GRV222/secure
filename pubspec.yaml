name: secure
description: "SECURE - Social Platform for Human Growth"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # State Management
  provider: ^6.1.2
  go_router: ^14.0.0

  # Media
  image_picker: ^1.1.2
  camera: ^0.11.0
  cached_network_image: ^3.4.1
  video_player: ^2.8.6
  chewie: ^1.7.5
  file_picker: ^8.0.0
  path_provider: ^2.1.3
  mime: ^1.0.5
  video_thumbnail: ^0.5.3

  # UI
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.0.0

  # Storage & Networking
  shared_preferences: ^2.3.2
  http: ^1.2.2

  # Utilities
  intl: ^0.19.0

  # ContentLayer security
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Location
  geolocator: ^13.0.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/

  # ── Custom Fonts ──────────────────────────────────────────────────────────
  # Download from Google Fonts, extract TTFs into assets/fonts/, then
  # uncomment the block below and run `flutter pub get`.
  #
  # fonts:
  #   - family: CormorantGaramond
  #     fonts:
  #       - asset: assets/fonts/CormorantGaramond-Light.ttf
  #         weight: 300
  #       - asset: assets/fonts/CormorantGaramond-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/CormorantGaramond-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/CormorantGaramond-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/CormorantGaramond-LightItalic.ttf
  #         weight: 300
  #         style: italic
  #   - family: PlusJakartaSans
  #     fonts:
  #       - asset: assets/fonts/PlusJakartaSans-Light.ttf
  #         weight: 300
  #       - asset: assets/fonts/PlusJakartaSans-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/PlusJakartaSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/PlusJakartaSans-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
  #         weight: 800

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080604"
  adaptive_icon_foreground: "assets/1024.png"
  remove_alpha_ios: true
  web:
    generate: false
